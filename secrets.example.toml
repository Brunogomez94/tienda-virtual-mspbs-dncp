# Copiar a .streamlit/secrets.toml (no subir a Git). En Streamlit Cloud: Settings → Secrets.

# --- Local (Postgres en tu PC) ---
# [postgres]
# host = "localhost"
# port = 5432
# user = "postgres"
# password = "TU_CONTRASEÑA"
# database = "postgres"

# --- Supabase: Session pooler (IPv4, típico Streamlit Cloud / us-east-1) ---
# user = postgres.<ID_PROYECTO>  (ver Supabase → Connect → Session pooler)
# [postgres]
# host = "aws-1-us-east-1.pooler.supabase.com"
# port = 6543
# user = "postgres.TU_ID_DE_PROYECTO"
# password = "TU_CONTRASEÑA"
# database = "postgres"
